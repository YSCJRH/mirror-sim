eval_name: fog_harbor_phase44_matrix
checks:
  - name: graph_has_events
    kind: graph_events_nonempty
  - name: core_entity_ids_present
    kind: world_object_ids_present
    collection: entities
    ids:
      - entity_lin_lan
      - entity_zhao_ke
      - entity_su_he
      - entity_chen_yu
      - entity_east_gate
      - entity_maintenance_ledger
      - entity_sea_lantern_festival
      - entity_east_wharf
  - name: core_relation_ids_present
    kind: world_object_ids_present
    collection: relations
    ids:
      - relation_lin_lan_controls_ledger
      - relation_su_he_inspects_gate
      - relation_zhao_ke_protects_festival
      - relation_chen_yu_tracks_gate
  - name: core_event_ids_present
    kind: world_object_ids_present
    collection: events
    ids:
      - event_budget_diversion
      - event_gate_failure_risk
      - event_dispatch_breakdown
      - event_storm_surge_warning
  - name: world_objects_have_evidence
    kind: world_evidence_complete
  - name: persona_fields_have_provenance
    kind: persona_field_provenance_complete
    fields:
      - public_role
      - goals
      - constraints
      - known_facts
      - private_info
      - relationships
  - name: inspect_entity_east_gate
    kind: inspect_world
    object_kind: entity
    object_id: entity_east_gate
  - name: inspect_persona_su_he
    kind: inspect_world
    object_kind: persona
    object_id: persona_su_he
  - name: inspect_event_gate_failure_risk
    kind: inspect_world
    object_kind: event
    object_id: event_gate_failure_risk
  - name: baseline_exposes_budget
    kind: run_field
    run: baseline
    field: budget_exposed
    equals: true
  - name: baseline_triggers_evacuation
    kind: run_field
    run: baseline
    field: evacuation_triggered
    equals: true
  - name: reporter_detained_delays_ledger
    kind: compare_runs
    left_run: reporter_detained
    left_field: ledger_public_turn
    op: gt
    right_run: baseline
    right_field: ledger_public_turn
  - name: reporter_detained_delays_evacuation
    kind: compare_runs
    left_run: reporter_detained
    left_field: evacuation_turn
    op: gt
    right_run: baseline
    right_field: evacuation_turn
  - name: reporter_detained_preserves_direct_warning_path
    kind: run_field
    run: reporter_detained
    field: risk_known_by
    equals:
      - entity_chen_yu
      - entity_su_he
  - name: harbor_comms_failure_delays_ledger
    kind: compare_runs
    left_run: harbor_comms_failure
    left_field: ledger_public_turn
    op: gt
    right_run: baseline
    right_field: ledger_public_turn
  - name: harbor_comms_failure_delays_evacuation
    kind: compare_runs
    left_run: harbor_comms_failure
    left_field: evacuation_turn
    op: gt
    right_run: baseline
    right_field: evacuation_turn
  - name: harbor_comms_failure_loses_direct_warning_path
    kind: run_field
    run: harbor_comms_failure
    field: risk_known_by
    equals:
      - entity_su_he
  - name: mayor_signal_blocked_keeps_publish_on_baseline_turn
    kind: run_field
    run: mayor_signal_blocked
    field: ledger_public_turn
    equals: 3
  - name: mayor_signal_blocked_keeps_evacuation_on_baseline_turn
    kind: run_field
    run: mayor_signal_blocked
    field: evacuation_turn
    equals: 5
  - name: mayor_signal_blocked_loses_direct_warning_path
    kind: run_field
    run: mayor_signal_blocked
    field: risk_known_by
    equals:
      - entity_su_he
  - name: claims_are_labeled
    kind: claim_labels_complete
  - name: claims_have_evidence
    kind: claim_evidence_complete
