services:
  mirror-web:
    image: ${MIRROR_IMAGE:-mirror-web:local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MIRROR_ENV: ${MIRROR_ENV:-production}
      MIRROR_COMMIT_SHA: ${MIRROR_COMMIT_SHA:-local}
      MIRROR_BOOTSTRAP_DEMO: ${MIRROR_BOOTSTRAP_DEMO:-1}
      MIRROR_PUBLIC_DEMO_MODE: ${MIRROR_PUBLIC_DEMO_MODE:-1}
      MIRROR_ALLOW_ANONYMOUS_RUNS: ${MIRROR_ALLOW_ANONYMOUS_RUNS:-0}
      MIRROR_HOSTED_MODEL_ENABLED: ${MIRROR_HOSTED_MODEL_ENABLED:-0}
      PYTHON: /opt/mirror-venv/bin/python
    volumes:
      - mirror-state:/app/mirror/state
      - mirror-artifacts:/app/mirror/artifacts
    ports:
      - "127.0.0.1:${MIRROR_WEB_LOCAL_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      mirror-web:
        condition: service_healthy
    environment:
      DEPLOY_DOMAIN: ${DEPLOY_DOMAIN:?Set DEPLOY_DOMAIN}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  mirror-state:
  mirror-artifacts:
  caddy-data:
  caddy-config:
