name: mirror-ci

on:
  push:
  pull_request:

concurrency:
  group: mirror-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend package
        run: python -m pip install -e backend[dev]

      - name: Run tests
        run: make test

      - name: Run smoke
        run: make smoke

      - name: Run eval-demo
        run: make eval-demo

      - name: Upload demo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-artifacts-linux
          path: artifacts/demo

  windows-quality-gate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend package
        run: python -m pip install -e backend[dev]

      - name: Run tests
        shell: pwsh
        run: .\make.ps1 test

      - name: Run smoke
        shell: pwsh
        run: .\make.ps1 smoke

      - name: Run eval-demo
        shell: pwsh
        run: .\make.ps1 eval-demo
